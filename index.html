<!DOCTYPE html>

    }
    
    #inputArea {
  position: relative;

    /* 高亮效果 */

    }
    
    .highlight-fragment {
      animation: highlightPulse 2s ease-in-out;

</head>
<body>
  <!-- 顶部触发区域 -->
  <div id="topTrigger"></div>
  
  <!-- 缩放控制 -->
  <div class="zoom-controls">
    <div class="zoom-btn" id="uiLock">🔒</div>
    <div class="zoom-btn" id="zoomInBtn">+</div>
    <div class="zoom-btn" id="zoomOutBtn">-</div>

  </div>

  <button id="spiralBtn">🌀 螺旋布局</button>
  
  <!-- 3D模式按钮 -->
  <button id="view3dBtn">🌐 进入3D岛屿</button>
  
  <!-- UI容器 -->
  <div id="uiContainer">
    <div id="inputArea">
      <h2>🌴 碎片岛屿 | 注意力追踪系统 🌴</h2>
      <div>请输入你今天的注意力使用：</div>
      <br>
      <textarea id="inputText" placeholder="如：刷微博 1 小时，写代码 3 小时，看视频 2 小时"></textarea>
      <div id="exampleText">支持格式: "刷抖音三个半小时", "工作2小时45分钟", "学习一小时二十五分", "写了两个小时四十五分钟的代码"</div>
      
      <div class="btn-container">
        <button onclick="processInput()">⭐ 生成岛屿</button>
        <button onclick="saveFragments()">💾 保存</button>
        <button onclick="loadFragments()">📂 加载</button>
        <button id="deleteBtn" onclick="deleteSelected()">🗑️ 删除岛屿</button>

      </div>
      
      <div class="btn-container">
        <input type="date" id="datePicker" onchange="highlightDate(this.value)" />
        <button onclick="exportToJson()">📤 导出JSON</button>
        <input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)" />
        <button onclick="document.getElementById('importFile').click()">📥 导入JSON</button>
        <button id="generateSummaryBtn" onclick="generateSummary()">📊 生成小结</button>
      </div>
      
      <div class="category-filter">
        <div class="category-btn active" data-category="all">全部</div>
        <div class="category-btn" data-category="娱乐">娱乐</div>
        <div class="category-btn" data-category="学习">学习</div>
        <div class="category-btn" data-category="工作">工作</div>
        <div class="category-btn" data-category="信息">信息</div>
        <div class="category-btn" data-category="其他">其他</div>
      </div>
    </div>
    
    <div id="statsPanel">
      <div class="stat-item">总岛屿数 <div class="stat-value" id="totalIslands">0</div></div>
      <div class="stat-item">总时间 <div class="stat-value" id="totalTime">0 小时</div></div>
      <div class="stat-item">最大岛屿 <div class="stat-value" id="maxIsland">0 小时</div></div>
    </div>
  </div>
  
  <div class="legend">
    <div class="legend-item"><div class="legend-color" style="background:#ffcc80"></div>娱乐</div>
    <div class="legend-item"><div class="legend-color" style="background:#80cbc4"></div>学习</div>
    <div class="legend-item"><div class="legend-color" style="background:#ce93d8"></div>工作</div>
    <div class="legend-item"><div class="legend-color" style="background:#ef9a9a"></div>信息</div>
    <div class="legend-item"><div class="legend-color" style="background:#b0bec5"></div>其他</div>
  </div>
  
  <div id="detailBox"></div>
  <canvas id="islandCanvas"></canvas>
  
  <div class="instructions">

  </div>
  
  <div id="debugInfo"></div>
  
  <!-- 3D场景容器 -->
  <div id="threeCanvas"></div>
  <button id="backTo2dBtn">⬅️ 返回2D视图</button>
  <div class="three-info">提示：鼠标拖拽可旋转视角 | 滚轮可缩放 | 分类: <span id="current3dCategory">全部</span></div>
  
  <!-- 小结面板 -->
  <div id="summaryPanel">
    <button id="closeSummary">×</button>
    <h2 id="summaryTitle">📅 每日注意力小结</h2>
    <div id="summaryContent"></div>
  </div>

  <script>
    const canvas = document.getElementById('islandCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 虚拟画布大小
    const virtualWidth = window.innerWidth * 2;
    const virtualHeight = window.innerHeight * 2;
    
    // 视图参数
    let viewOffsetX = virtualWidth / 4;
    let viewOffsetY = virtualHeight / 4;
    let scale = 1;
    let isDragging = false;
    let lastX = 0;
    let lastY = 0;
    
    const centerX = virtualWidth / 2, centerY = virtualHeight / 2;
    const colors = { 
      "娱乐": "#ffcc80",
      "学习": "#80cbc4",
      "工作": "#ce93d8",
      "信息": "#ef9a9a",
      "其他": "#b0bec5"
    };
    
    const fragments = [];
    let selectedDate = getTodayDate();
    let hoveredFragment = null, selectedFragment = null;
    let debugInfo = [];
    let uiLocked = false;
    let uiTimeout = null;
    let activeCategory = "all";
    let lastAddedFragment = null;
    let highlightTimeout = null;
    let useSpiralLayout = false;

    // DOM元素
    const detailBox = document.getElementById('detailBox');
    const deleteBtn = document.getElementById('deleteBtn');
    const debugInfoDiv = document.getElementById('debugInfo');
    const totalIslandsEl = document.getElementById('totalIslands');
    const totalTimeEl = document.getElementById('totalTime');
    const maxIslandEl = document.getElementById('maxIsland');
    const uiContainer = document.getElementById('uiContainer');
    const topTrigger = document.getElementById('topTrigger');
    const uiLock = document.getElementById('uiLock');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const resetViewBtn = document.getElementById('resetViewBtn');
    const view3dBtn = document.getElementById('view3dBtn');
    const backTo2dBtn = document.getElementById('backTo2dBtn');
    const threeCanvas = document.getElementById('threeCanvas');
    const current3dCategory = document.getElementById('current3dCategory');
    const summaryPanel = document.getElementById('summaryPanel');
    const closeSummary = document.getElementById('closeSummary');
    const summaryContent = document.getElementById('summaryContent');
    const summaryTitle = document.getElementById('summaryTitle');
    const spiralBtn = document.getElementById('spiralBtn');

    // Three.js变量
    let scene, camera, renderer, controls;
    let islandMeshes = [];
    let is3dMode = false;

    class Fragment {
      constructor(label, duration, x, y, tx, ty, color, category, date=getTodayDate()) {
        this.label = label; 
        this.duration = duration; 
        this.x = x; 
        this.y = y;
        this.tx = tx; 
        this.ty = ty; 
        this.rotation = Math.random()*2*Math.PI;
        this.opacity = 0; 
        this.color = color;
        this.radius = Math.sqrt(duration * 350);
        this.points = this.generateBlobPoints();
        this.floatOffset = Math.random()*2*Math.PI;
        this.vx = 0; 
        this.vy = 0; 
        this.arrived = false;
        this.category = category; 
        this.date = date;
        this.isToday = date === selectedDate;
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.02;
        this.id = Math.random().toString(36).substr(2, 9);
        this.isNew = false;
        this.addedTime = Date.now();
      }
      
      generateBlobPoints() {
        const pts = []; 
        const numPoints = 16;
        
        for(let i = 0; i < numPoints; i++) {
          const angle = i/numPoints * 2 * Math.PI;
          const variation = 0.3;
          const r = this.radius * (1 + (Math.random() - 0.5) * variation);
          pts.push({x: Math.cos(angle)*r, y: Math.sin(angle)*r});
        } 
        return pts;
      }
      
      update() {
        const dx = this.tx - this.x, dy = this.ty - this.y;
        const dist = Math.hypot(dx, dy);
        
        if(!this.arrived && dist < 0.5) {
          this.arrived = true; 
          this.vx = this.vy = 0;
        }
        
        if(!this.arrived) {
          const ease = Math.min(0.01, 0.4/(dist+0.1)); 
          this.vx += dx * ease; 
          this.vy += dy * ease;
        }
        
        fragments.forEach(other => {
          if(other !== this) {
            const ox = this.x - other.x, oy = this.y - other.y;
            const d = Math.hypot(ox, oy);
            const minDist = this.radius + other.radius + 20;
            
            if(d < minDist) {
              const repulsion = (minDist - d) * 0.03;
              this.vx += (ox / d) * repulsion;
              this.vy += (oy / d) * repulsion;
            }
          }
        });
        
        this.vx *= 0.88; 
        this.vy *= 0.88; 
        this.x += this.vx; 
        this.y += this.vy;
        
        this.floatOffset += 0.02; 
        this.fx = Math.cos(this.floatOffset) * 5;
        this.fy = Math.sin(this.floatOffset*1.2) * 4;
        
        this.opacity += (1 - this.opacity) * 0.08;
        
        // 呼吸灯效果
        this.pulsePhase += this.pulseSpeed;
        
        // 检查高亮状态
        if (this.isNew && (Date.now() - this.addedTime > 5000)) {
          this.isNew = false;
        }
      }
      
      draw(ctx, offsetX, offsetY, scale) {
        if (activeCategory !== "all" && this.category !== activeCategory) return;
        
        const x = (this.x + this.fx - offsetX) * scale;
        const y = (this.y + this.fy - offsetY) * scale;
        const radius = this.radius * scale;
        
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(this.rotation);
        ctx.globalAlpha = this.opacity;
        
        const isHovered = this === hoveredFragment;
        const s = isHovered ? 1.25 : 1.0;
        ctx.scale(s, s);
        
        // 呼吸灯效果
        const pulseIntensity = 0.2 * Math.sin(this.pulsePhase) + 0.8;
        const r = parseInt(this.color.slice(1, 3), 16);
        const g = parseInt(this.color.slice(3, 5), 16);
        const b = parseInt(this.color.slice(5, 7), 16);
        
        // 岛屿主体
        ctx.fillStyle = this.isToday 
          ? `rgba(${r}, ${g}, ${b}, ${pulseIntensity})`
          : this.color;
        
        ctx.beginPath();
        const start = this.points[0]; 
        ctx.moveTo(start.x * scale, start.y * scale);
        
        for(let i = 1; i < this.points.length; i++) {
          ctx.lineTo(this.points[i].x * scale, this.points[i].y * scale);
        }
        
        ctx.closePath(); 
        ctx.fill();
        
        // 岛屿边框
        const lineWidth = (this === selectedFragment) ? 4 : (this.isToday ? 4 : 2);
        ctx.lineWidth = lineWidth * scale;
        
        // 高亮新添加的岛屿
        if (this.isNew) {
          ctx.strokeStyle = 'rgba(255, 255, 0, 0.8)';
        } else {
          ctx.strokeStyle = (this === selectedFragment) ? 'white' : 
                            (this.isToday ? 'rgba(255,255,255,0.9)' : 'rgba(255,255,255,0.4)');
        }
        
        ctx.stroke();
        
        ctx.restore();
      }
      
      isPointInside(mx, my, offsetX, offsetY, scale) {
        const x = (this.x - offsetX) * scale;
        const y = (this.y - offsetY) * scale;
        const dx = mx - x, dy = my - y;
        return dx*dx + dy*dy <= (this.radius * scale) * (this.radius * scale);
      }
      
      showDetails() {
        let durationText = '';
        if (this.duration >= 1) {
          const hours = Math.floor(this.duration);
          const minutes = Math.round((this.duration - hours) * 60);
          durationText = `${hours}小时`;
          if (minutes > 0) durationText += `${minutes}分钟`;
        } else {
          durationText = `${Math.round(this.duration * 60)}分钟`;
        }
        
        detailBox.innerHTML = `
          <strong>${this.label}</strong><br/>
          分类：${this.category}<br/>
          时长：${durationText}<br/>
          日期：${this.date}
        `;
        detailBox.style.display = 'block';
      }
      
      // 创建3D岛屿表示 - 优化为有皱褶的倒圆锥
      create3dMesh() {
        // 岛屿尺寸计算
        const islandScale = this.radius / 40;
        const islandHeight = islandScale * 1.5;
        const baseRadius = islandScale;
        
        // 创建倒圆锥（顶部小，底部大）
        const segments = 10;
        const islandGeometry = new THREE.ConeGeometry(
          baseRadius * 0.3, // 顶部半径（小）
          baseRadius,        // 底部半径（大）
          segments,          // 径向分段数
          1,                 // 高度分段数
          false              // 是否开放末端
        );
        
        // 旋转180度使圆锥倒置
        islandGeometry.rotateX(Math.PI);
        
        // 添加皱褶效果 - 随机化顶点位置
        const positionAttribute = islandGeometry.getAttribute('position');
        for (let i = 0; i < positionAttribute.count; i++) {
          const x = positionAttribute.getX(i);
          const y = positionAttribute.getY(i);
          const z = positionAttribute.getZ(i);
          
          // 只在侧面添加皱褶（排除顶部和底部的点）
          if (y < islandHeight/2 - 0.1 && y > -islandHeight/2 + 0.1) {
            const variation = 0.2;
            positionAttribute.setX(i, x + (Math.random() - 0.5) * variation);
            positionAttribute.setY(i, y + (Math.random() - 0.5) * variation * 0.5);
            positionAttribute.setZ(i, z + (Math.random() - 0.5) * variation);
          }
        }
        positionAttribute.needsUpdate = true;
        islandGeometry.computeVertexNormals();
        
        // 创建材质
        const islandMaterial = new THREE.MeshPhongMaterial({
          color: this.color,
          emissive: this.isToday ? this.color : "#000000",
          emissiveIntensity: this.isToday ? 0.3 : 0,
          shininess: 30,
          transparent: true,
          opacity: 0.95
        });
        
        const islandMesh = new THREE.Mesh(islandGeometry, islandMaterial);
        
        // 添加一些额外的岩石细节
        for (let i = 0; i < 3; i++) {
          const rockSize = baseRadius * (0.1 + Math.random() * 0.08);
          const rockGeometry = new THREE.DodecahedronGeometry(rockSize, 0);
          
          // 随机化岩石形状
          const rockPosition = rockGeometry.getAttribute('position');
          for (let j = 0; j < rockPosition.count; j++) {
            rockPosition.setX(j, rockPosition.getX(j) * (0.8 + Math.random() * 0.4));
            rockPosition.setY(j, rockPosition.getY(j) * (0.8 + Math.random() * 0.4));
            rockPosition.setZ(j, rockPosition.getZ(j) * (0.8 + Math.random() * 0.4));
          }
          rockPosition.needsUpdate = true;
          
          const rockMaterial = new THREE.MeshPhongMaterial({
            color: this.color,
            shininess: 20
          });
          
          const rockMesh = new THREE.Mesh(rockGeometry, rockMaterial);
          
          // 随机放置岩石在岛屿侧面
          const angle = Math.random() * Math.PI * 2;
          const distance = baseRadius * (0.6 + Math.random() * 0.3);
          rockMesh.position.set(
            Math.cos(angle) * distance,
            (Math.random() - 0.5) * islandHeight * 0.5,
            Math.sin(angle) * distance
          );
          
          rockMesh.rotation.set(
            Math.random() * 0.5,
            Math.random() * Math.PI * 2,
            Math.random() * 0.5
          );
          
          islandMesh.add(rockMesh);
        }
        
        // 位置设置（三维空间分布）
        const angle = Math.random() * Math.PI * 2;
        const distance = 15 + Math.random() * 10;
        const height = -5 + Math.random() * 10;
        
        islandMesh.position.set(
          Math.cos(angle) * distance,
          height,
          Math.sin(angle) * distance
        );
        
        // 随机旋转
        islandMesh.rotation.x = Math.random() * 0.1;
        islandMesh.rotation.y = Math.random() * Math.PI * 2;
        islandMesh.rotation.z = Math.random() * 0.1;
        
        // 存储额外信息
        islandMesh.userData = {
          fragment: this,
          id: this.id
        };
        
        return islandMesh;
      }
    }

    function getTodayDate() {
      return new Date().toISOString().split('T')[0];
    }

    function chineseToNumber(chineseStr) {
      const numMap = {
        "零":0, "一":1, "二":2, "三":3, "四":4, "五":5, 
        "六":6, "七":7, "八":8, "九":9, "十":10, 
        "两":2, "半":0.5, "整":1, "个":1,
        "廿":20, "卅":30, "卌":40
      };
      
      // 特殊时间表达
      if (chineseStr.includes('一刻')) return 0.25;
      if (chineseStr.includes('三刻')) return 0.75;
      if (chineseStr.includes('半') && chineseStr.length <= 2) return 0.5;
      
      // 尝试匹配复合数字（如"二十五"）
      if (/[一二三四五六七八九十两][十百千]?[一二三四五六七八九]?/.test(chineseStr)) {
        let total = 0;
        let current = 0;
        
        for (let i = 0; i < chineseStr.length; i++) {
          const char = chineseStr[i];
          if (numMap[char] !== undefined) {
            if (char === '十' || char === '百' || char === '千') {
              if (current === 0) current = 1;
              total += current * numMap[char];
              current = 0;
            } else {
              current = numMap[char];
            }
          }
        }
        
        total += current;
        return total;
      }
      
      // 尝试解析纯数字
      const numMatch = chineseStr.match(/\d+(\.\d+)?/);
      if (numMatch) {
        return parseFloat(numMatch[0]);
      }
      
      // 默认值
      return numMap[chineseStr] || 0;
    }

    function extractDuration(text) {
      debugInfo = [`原始文本: "${text}"`];
      let totalHours = 0;
      
      // 1. 尝试匹配组合格式 (小时 + 分钟)
      const combinedPattern = /(\d+|[零一二三四五六七八九十两半整廿卅卌]+)\s*(?:小时|时|h|个钟|个)?\s*(\d+|[零一二三四五六七八九十两半整廿卅卌]+)\s*(?:分钟|分|m)/i;
      const combinedMatch = text.match(combinedPattern);
      
      if (combinedMatch) {
        debugInfo.push(`匹配到组合格式: 小时部分=${combinedMatch[1]}, 分钟部分=${combinedMatch[2]}`);
        
        const hours = chineseToNumber(combinedMatch[1]);
        const minutes = chineseToNumber(combinedMatch[2]);
        
        totalHours = hours + (minutes / 60);
        debugInfo.push(`组合格式解析结果: ${hours}小时 + ${minutes}分钟 = ${totalHours}小时`);
        return totalHours;
      }
      
      // 2. 尝试匹配"X个半小时"格式
      const halfHourPattern = /(\d+|[零一二三四五六七八九十两]+)\s*个\s*半\s*(?:小时|时)/i;
      const halfHourMatch = text.match(halfHourPattern);
      
      if (halfHourMatch) {
        debugInfo.push(`匹配到"X个半小时"格式: ${halfHourMatch[1]}`);
        const num = chineseToNumber(halfHourMatch[1]);
        return num * 0.5;
      }
      
      // 3. 尝试匹配纯小时格式
      const hourPattern = /(\d+|[零一二三四五六七八九十两半整廿卅卌]+)\s*(?:小时|时|h|个钟|个)/i;
      const hourMatch = text.match(hourPattern);
      
      if (hourMatch) {
        const hours = chineseToNumber(hourMatch[1]);
        debugInfo.push(`匹配到小时部分: ${hourMatch[1]} = ${hours}小时`);
        totalHours += hours;
      }
      
      // 4. 尝试匹配纯分钟格式
      const minutePattern = /(\d+|[零一二三四五六七八九十两半整廿卅卌]+)\s*(?:分钟|分|m)/i;
      const minuteMatch = text.match(minutePattern);
      
      if (minuteMatch) {
        const minutes = chineseToNumber(minuteMatch[1]);
        debugInfo.push(`匹配到分钟部分: ${minuteMatch[1]} = ${minutes}分钟`);
        totalHours += minutes / 60;
      }
      
      // 5. 尝试匹配数字格式 (如 1.5, 2.25)
      if (totalHours === 0) {
        const numMatch = text.match(/\d+(\.\d+)?/);
        if (numMatch) {
          debugInfo.push(`匹配到纯数字: ${numMatch[0]}`);
          return parseFloat(numMatch[0]);
        }
        
        // 6. 尝试匹配无单位数字 (如 "两小时四十五分")
        const implicitPattern = /([零一二三四五六七八九十两半整廿卅卌]+)小时([零一二三四五六七八九十两半整廿卅卌]+)分/;
        const implicitMatch = text.match(implicitPattern);
        
        if (implicitMatch) {
          const hours = chineseToNumber(implicitMatch[1]);
          const minutes = chineseToNumber(implicitMatch[2]);
          totalHours = hours + (minutes / 60);
          debugInfo.push(`匹配到隐式格式: ${implicitMatch[1]}小时${implicitMatch[2]}分 = ${totalHours}小时`);
          return totalHours;
        }
        
        debugInfo.push(`未匹配到时间信息，使用默认值1小时`);
        return 1;
      }
      
      debugInfo.push(`最终解析结果: ${totalHours}小时`);
      return totalHours;
    }

    function getClusterTarget(category, date) {
      const today = new Date();
      const fragmentDate = new Date(date);
      const diffTime = Math.abs(today - fragmentDate);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      // 根据天数决定距离中心的位置（天数越新，距离越远）
      const baseDistance = 200;
      const distance = baseDistance + (diffDays * 50);
      
      const angle = Math.random() * 2 * Math.PI;
      return { 
        x: centerX + Math.cos(angle) * distance, 
        y: centerY + Math.sin(angle) * distance 
      };
    }

    function processInput() {
      const input = document.getElementById('inputText').value;
      if (!input.trim()) return;
      
      const items = input.split(/[，,。\.\n]/).filter(s => s.trim());
      const date = getTodayDate();
      
      // 清除之前的高亮
      if (lastAddedFragment) {
        lastAddedFragment.isNew = false;
      }
      
      items.forEach(item => {
        const label = item.trim();
        if (!label) return;
        
        const duration = extractDuration(label);
        const category = classifyLabel(label);
        const target = getClusterTarget(category, date);
        
        const angle = Math.random() * 2 * Math.PI;
        const distance = virtualWidth * 0.7;
        const sx = centerX + Math.cos(angle) * distance;
        const sy = centerY + Math.sin(angle) * distance;
        
        const fragment = new Fragment(
          label, 
          duration, 
          sx, 
          sy, 
          target.x, 
          target.y, 
          colors[category], 
          category, 
          date
        );
        
        fragment.isNew = true;
        lastAddedFragment = fragment;
        
        fragments.push(fragment);
      });
      
      // 设置高亮超时
      if (highlightTimeout) {
        clearTimeout(highlightTimeout);
      }
      highlightTimeout = setTimeout(() => {
        if (lastAddedFragment) {
          lastAddedFragment.isNew = false;
          lastAddedFragment = null;
        }
      }, 5000);
      
      // 更新统计数据
      updateStats();
      // 显示调试信息
      updateDebugInfo();
      
      saveFragments();
    }

    function animate() {
      if (is3dMode) return;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      // 绘制背景效果
      drawBackground();
      
      hoveredFragment = null;
      
      // 更新和绘制所有岛屿
      fragments.forEach(f => f.update());
      fragments.forEach(f => f.draw(ctx, viewOffsetX, viewOffsetY, scale));
      
      requestAnimationFrame(animate);
    }
    
    function drawBackground() {
      // 渐变背景
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, '#0a1a2f');
      gradient.addColorStop(1, '#1a2b40');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // 绘制星星
      ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
      for (let i = 0; i < 300; i++) {
        const x = Math.random() * canvas.width;
        const y = Math.random() * canvas.height;
        const r = Math.random() * 2;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      
      // 绘制中心光晕
      const centerXOnCanvas = (centerX - viewOffsetX) * scale;
      const centerYOnCanvas = (centerY - viewOffsetY) * scale;
      
      const centerGlow = ctx.createRadialGradient(
        centerXOnCanvas, centerYOnCanvas, 0,
        centerXOnCanvas, centerYOnCanvas, 600 * scale
      );
      centerGlow.addColorStop(0, 'rgba(128, 203, 196, 0.15)');
      centerGlow.addColorStop(1, 'rgba(128, 203, 196, 0)');
      
      ctx.fillStyle = centerGlow;
      ctx.beginPath();
      ctx.arc(centerXOnCanvas, centerYOnCanvas, 600 * scale, 0, Math.PI * 2);
      ctx.fill();
    }

    function saveFragments() {
      localStorage.setItem('attentionIslands', JSON.stringify(fragments));
    }

    function loadFragments() {
      const data = JSON.parse(localStorage.getItem('attentionIslands') || '[]');
      data.forEach(d => {
        const fragment = new Fragment(
          d.label,
          d.duration,
          d.x,
          d.y,
          d.tx,
          d.ty,
          d.color,
          d.category,
          d.date
        );
        
        // 更新目标位置（按日期分层）
        fragment.tx = getClusterTarget(d.category, d.date).x;
        fragment.ty = getClusterTarget(d.category, d.date).y;
        
        fragments.push(fragment);
      });
      
      updateStats();
    }

    function highlightDate(date) {
      selectedDate = date;
      fragments.forEach(f => f.isToday = (f.date === date));
    }

    function deleteSelected() {
      if (selectedFragment) {
        const index = fragments.indexOf(selectedFragment);
        if (index !== -1) {
          fragments.splice(index, 1);
          selectedFragment = null;
          detailBox.style.display = 'none';
          deleteBtn.classList.remove('highlight');
          saveFragments();
          updateStats();
        }
      }
    }

    function exportToJson() {
      const blob = new Blob([JSON.stringify(fragments, null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `attention_islands_${getTodayDate()}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function handleImport(e) {
      const file = e.target.files[0]; 
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          data.forEach(d => {
            const fragment = new Fragment(
              d.label,
              d.duration,
              d.x,
              d.y,
              d.tx,
              d.ty,
              d.color,
              d.category,
              d.date
            );
            
            // 更新目标位置（按日期分层）
            fragment.tx = getClusterTarget(d.category, d.date).x;
            fragment.ty = getClusterTarget(d.category, d.date).y;
            
            fragments.push(fragment);
          });
          saveFragments();
          updateStats();
        } catch (err) {
          alert('导入失败，请检查 JSON 格式');
          console.error(err);
        }
      };
      reader.readAsText(file);
    }
    
    function updateDebugInfo() {
      debugInfoDiv.innerHTML = debugInfo.join('<br>');
    }
    
    function toggleDebugInfo() {
      debugInfoDiv.style.display = debugInfoDiv.style.display === 'block' ? 'none' : 'block';
    }
    
    function updateStats() {
      totalIslandsEl.textContent = fragments.length;
      
      const totalTime = fragments.reduce((sum, frag) => sum + frag.duration, 0);
      totalTimeEl.textContent = totalTime.toFixed(2) + ' 小时';
      
      const maxDuration = fragments.length > 0 ? 
        Math.max(...fragments.map(f => f.duration)) : 0;
      maxIslandEl.textContent = maxDuration.toFixed(2) + ' 小时';
    }
    
    function showUI() {
      uiContainer.classList.add('visible');
      clearTimeout(uiTimeout);
      
      if (!uiLocked) {
        uiTimeout = setTimeout(() => {
          if (!uiLocked && !uiContainer.matches(':hover')) {
            hideUI();
          }
        }, 3000);
      }
    }
    
    function hideUI() {
      uiContainer.classList.remove('visible');
    }
    
    function toggleUILock() {
      uiLocked = !uiLocked;
      uiLock.textContent = uiLocked ? '🔓' : '🔒';
      uiLock.classList.toggle('locked', uiLocked);
      
      if (uiLocked) {
        showUI();
        clearTimeout(uiTimeout);
      } else {
        hideUI();
      }
    }
    
    function zoomIn() {
      const oldScale = scale;
      scale = Math.min(scale * 1.2, 4);
      adjustViewForZoom(oldScale);
    }
    
    function zoomOut() {
      const oldScale = scale;
      scale = Math.max(scale / 1.2, 0.5);
      adjustViewForZoom(oldScale);
    }
    
    function adjustViewForZoom(oldScale) {
      // 计算中心点位置
      const centerX = canvas.width / 2;
      const centerY = canvas.height / 2;
      
      // 计算中心点在虚拟画布上的位置
      const virtualCenterX = (centerX / oldScale) + viewOffsetX;
      const virtualCenterY = (centerY / oldScale) + viewOffsetY;
      
      // 调整偏移量使中心点保持不变
      viewOffsetX = virtualCenterX - (centerX / scale);
      viewOffsetY = virtualCenterY - (centerY / scale);
    }
    
    function resetView() {
      scale = 1;
      viewOffsetX = virtualWidth / 4;
      viewOffsetY = virtualHeight / 4;
    }
    
    function zoomToPoint(x, y) {
      const targetScale = Math.min(scale * 1.5, 4);
      const targetX = x - (canvas.width / 2) / targetScale;
      const targetY = y - (canvas.height / 2) / targetScale;
      
      viewOffsetX = targetX;
      viewOffsetY = targetY;
      scale = targetScale;
    }
    
    // ================= 斐波那契螺旋布局 =================
    function arrangeInSpiral() {
      if (fragments.length === 0) return;
      
      // 按日期排序（从早到晚）
      const sortedFragments = [...fragments].sort((a, b) => 
        new Date(a.date) - new Date(b.date)
      );
      
      // 斐波那契螺旋参数
      const goldenAngle = Math.PI * (3 - Math.sqrt(5)); // 黄金角度
      const scaleFactor = 20; // 控制螺旋大小
      
      sortedFragments.forEach((fragment, index) => {
        // 斐波那契螺旋公式
        const radius = scaleFactor * Math.sqrt(index);
        const angle = index * goldenAngle;
        
        // 计算目标位置
        fragment.tx = centerX + radius * Math.cos(angle);
        fragment.ty = centerY + radius * Math.sin(angle);
        
        // 重置到达状态，让岛屿开始移动
        fragment.arrived = false;
      });
      
      // 提示用户
      alert("已应用斐波那契螺旋布局！岛屿将根据日期顺序排列，最早的岛屿在中心。");
    }
    
    // ================= 小结功能 =================
    function generateSummary() {
      const date = document.getElementById('datePicker').value;
      const dateFragments = fragments.filter(f => f.date === date);
      
      if (dateFragments.length === 0) {
        alert(`没有找到 ${date} 的数据`);
        return;
      }
      
      // 计算各类别总时长
      const categories = ["娱乐", "学习", "工作", "信息", "其他"];
      const categoryTimes = {};
      let totalTime = 0;
      
      categories.forEach(cat => {
        const time = dateFragments
          .filter(f => f.category === cat)
          .reduce((sum, f) => sum + f.duration, 0);
        
        categoryTimes[cat] = time;
        totalTime += time;
      });
      
      // 生成评语
      const comment = generateComment(categoryTimes, totalTime);
      
      // 更新小结面板内容
      summaryTitle.textContent = `📅 ${date} 注意力小结`;
      summaryContent.innerHTML = `
        <div class="summary-section">
          <h3>📊 注意力分布</h3>
          <div class="chart-container" id="categoryChart"></div>
          <div class="summary-stats">
            <div class="stat-card">
              <div class="value">${dateFragments.length}</div>
              <div class="label">总岛屿数</div>
            </div>
            <div class="stat-card">
              <div class="value">${totalTime.toFixed(1)}</div>
              <div class="label">总时间(小时)</div>
            </div>
            <div class="stat-card">
              <div class="value">${Math.max(...Object.values(categoryTimes)).toFixed(1)}</div>
              <div class="label">最大类别(小时)</div>
            </div>
            <div class="stat-card">
              <div class="value">${(totalTime / dateFragments.length).toFixed(1)}</div>
              <div class="label">平均时长(小时)</div>
            </div>
          </div>
        </div>
        <div class="summary-section">
          <h3>💬 每日小结</h3>
          <div id="summaryComment">${comment}</div>
        </div>
      `;
      
      // 绘制柱状图
      drawBarChart(categoryTimes, totalTime);
      
      // 显示小结面板
      summaryPanel.style.display = 'block';
    }
    
    function drawBarChart(categoryTimes, totalTime) {
      const chartContainer = document.getElementById('categoryChart');
      const maxValue = Math.max(...Object.values(categoryTimes));
      
      // 创建柱状图
      Object.entries(categoryTimes).forEach(([category, time]) => {
        if (time === 0) return;
        
        const barHeight = (time / maxValue) * 150;
        const bar = document.createElement('div');
        bar.className = 'chart-bar';
        bar.style.height = `${barHeight}px`;
        
        const label = document.createElement('div');
        label.className = 'chart-label';
        label.textContent = category;
        
        const value = document.createElement('div');
        value.className = 'chart-value';
        value.textContent = time.toFixed(1);
        
        bar.appendChild(value);
        bar.appendChild(label);
        chartContainer.appendChild(bar);
      });
    }
    
    function generateComment(categoryTimes, totalTime) {
      const {娱乐, 学习, 工作} = categoryTimes;
      const leisureRatio = 娱乐 / totalTime;
      const studyRatio = 学习 / totalTime;
      const workRatio = 工作 / totalTime;
      
      // 找到耗时最多的类别
      let maxCategory = "其他";
      let maxTime = 0;
      
      Object.entries(categoryTimes).forEach(([category, time]) => {
        if (time > maxTime) {
          maxTime = time;
          maxCategory = category;
        }
      });
      
      // 根据主要类别生成评语
      let comment = "";
      
      switch(maxCategory) {
        case "娱乐":
          comment = `今天主要是娱乐时间（${娱乐.toFixed(1)}小时），`;
          if (leisureRatio > 0.6) {
            comment += "享受了轻松愉快的一天！";
          } else if (leisureRatio > 0.4) {
            comment += "劳逸结合得不错！";
          } else {
            comment += "适当的娱乐有助于放松身心！";
          }
          break;
          
        case "学习":
          comment = `今天主要是学习时间（${学习.toFixed(1)}小时），`;
          if (studyRatio > 0.6) {
            comment += "真是专注学习的一天，知识就是力量！";
          } else if (studyRatio > 0.4) {
            comment += "学习使你进步，继续保持！";
          } else {
            comment += "学到了新知识，继续加油！";
          }
          break;
          
        case "工作":
          comment = `今天主要是工作时间（${工作.toFixed(1)}小时），`;
          if (workRatio > 0.6) {
            comment += "高效工作的一天，成就感满满！";
          } else if (workRatio > 0.4) {
            comment += "工作辛苦了，休息也很重要！";
          } else {
            comment += "完成了工作任务，效率不错！";
          }
          break;
          
        case "信息":
          comment = `今天主要是信息获取时间（${categoryTimes.信息.toFixed(1)}小时），`;
          comment += "获取新知识是成长的重要部分！";
          break;
          
        default:
          comment = "今天的时间分布均衡，";
          if (totalTime > 10) {
            comment += "度过了充实而漫长的一天！";
          } else if (totalTime < 4) {
            comment += "轻松的一天，给自己充充电也不错~";
          } else {
            comment += "生活丰富多彩！";
          }
      }
      
      // 添加特殊情况的评语
      if (娱乐 > 6 && workRatio < 0.2 && studyRatio < 0.2) {
        comment += " 娱乐放松后，明天再继续努力吧！";
      }
      
      if (工作 > 8) {
        comment += " 记得适当休息，劳逸结合很重要！";
      }
      
      if (学习 > 6) {
        comment += " 大脑需要休息，适当放松效果更好！";
      }
      
      return comment;
    }
    
    // ================= 3D功能 =================
    function init3dScene() {
      // 创建场景
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x0a1a2f);
      
      // 添加环境光
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
      scene.add(ambientLight);
      
      // 添加方向光
      const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight1.position.set(1, 1, 1);
      scene.add(directionalLight1);
      
      const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.5);
      directionalLight2.position.set(-1, -1, -1);
      scene.add(directionalLight2);
      
      // 创建相机
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
      camera.position.z = 30;
      camera.position.y = 15;
      camera.position.x = 15;
      camera.lookAt(0,0,0);
      
      // 创建渲染器
      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x0a1a2f);
      threeCanvas.innerHTML = ''; // 清除旧内容
      threeCanvas.appendChild(renderer.domElement);
      
      // 添加轨道控制器
      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.05;
      controls.screenSpacePanning = false;
      controls.minDistance = 5;
      controls.maxDistance = 100;
      
      // 创建岛屿网格
      createIslandMeshes();
      
      // 添加星空背景
      createStarfield();
      
      // 开始渲染
      animate3d();
    }
    
    function createIslandMeshes() {
      // 清除现有网格
      islandMeshes.forEach(mesh => scene.remove(mesh));
      islandMeshes = [];
      
      // 获取当前分类的岛屿
      const filteredFragments = fragments.filter(f => 
        activeCategory === "all" || f.category === activeCategory
      );
      
      // 如果没有岛屿，则添加提示
      if (filteredFragments.length === 0) {
        console.log("没有符合条件的岛屿");
        return;
      }
      
      // 创建新网格
      filteredFragments.forEach(fragment => {
        const mesh = fragment.create3dMesh();
        scene.add(mesh);
        islandMeshes.push(mesh);
      });
    }
    
    function createStarfield() {
      const starGeometry = new THREE.BufferGeometry();
      const starMaterial = new THREE.PointsMaterial({
        color: 0xffffff,
        size: 0.1,
        transparent: true,
        sizeAttenuation: false
      });
      
      const starVertices = [];
      for (let i = 0; i < 10000; i++) {
        const x = (Math.random() - 0.5) * 2000;
        const y = (Math.random() - 0.5) * 2000;
        const z = (Math.random() - 0.5) * 2000;
        starVertices.push(x, y, z);
      }
      
      starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
      const stars = new THREE.Points(starGeometry, starMaterial);
      scene.add(stars);
    }
    
    function animate3d() {
      if (!is3dMode) return;
      
      requestAnimationFrame(animate3d);
      
      // 更新岛屿位置和动画
      islandMeshes.forEach(mesh => {
        // 添加浮动效果
        const time = Date.now() * 0.001;
        mesh.position.y += Math.sin(time * 0.5 + mesh.userData.fragment.floatOffset) * 0.02;
        mesh.rotation.y += 0.001;
      });
      
      controls.update();
      renderer.render(scene, camera);
    }
    
    function enter3dMode() {
      is3dMode = true;
      
      // 隐藏2D元素
      canvas.style.display = 'none';
      document.querySelector('.instructions').style.display = 'none';
      document.querySelector('.legend').style.display = 'none';
      uiContainer.style.display = 'none';
      view3dBtn.style.display = 'none';
      detailBox.style.display = 'none';
      spiralBtn.style.display = 'none';
      
      // 显示3D元素
      threeCanvas.style.display = 'block';
      backTo2dBtn.style.display = 'block';
      document.querySelector('.three-info').style.display = 'block';
      current3dCategory.textContent = activeCategory;
      
      // 初始化3D场景
      if (!scene) {
        init3dScene();
      } else {
        init3dScene(); // 重新初始化场景避免卡死
      }
    }
    
    function exit3dMode() {
      is3dMode = false;
      
      // 显示2D元素
      canvas.style.display = 'block';
      document.querySelector('.instructions').style.display = 'block';
      document.querySelector('.legend').style.display = 'block';
      uiContainer.style.display = 'block';
      view3dBtn.style.display = 'block';
      spiralBtn.style.display = 'block';
      
      // 隐藏3D元素
      threeCanvas.style.display = 'none';
      backTo2dBtn.style.display = 'none';
      document.querySelector('.three-info').style.display = 'none';
      
      // 恢复2D动画
      animate();
    }

    // 事件监听器
    canvas.addEventListener('mousemove', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      
      // 转换到虚拟画布坐标
      const vx = mx / scale + viewOffsetX;
      const vy = my / scale + viewOffsetY;
      
      hoveredFragment = fragments.find(f => f.isPointInside(mx, my, viewOffsetX, viewOffsetY, scale)) || null;
      canvas.style.cursor = hoveredFragment ? 'pointer' : isDragging ? 'grabbing' : 'grab';
      
      if (isDragging) {
        const dx = (lastX - mx) / scale;
        const dy = (lastY - my) / scale;
        viewOffsetX += dx;
        viewOffsetY += dy;
        lastX = mx;
        lastY = my;
      }
    });

    canvas.addEventListener('mousedown', e => {
      if (e.button === 0) { // 左键
        isDragging = true;
        const rect = canvas.getBoundingClientRect();
        lastX = e.clientX - rect.left;
        lastY = e.clientY - rect.top;
        canvas.style.cursor = 'grabbing';
      }
    });
    
    canvas.addEventListener('mouseup', () => {
      isDragging = false;
      canvas.style.cursor = 'grab';
    });
    
    canvas.addEventListener('mouseleave', () => {
      isDragging = false;
      canvas.style.cursor = 'grab';
    });
    
    canvas.addEventListener('dblclick', e => {
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      
      const clickedFragment = fragments.find(f => f.isPointInside(mx, my, viewOffsetX, viewOffsetY, scale));
      
      if (clickedFragment) {
        // 双击岛屿时放大该岛屿
        const vx = clickedFragment.x;
        const vy = clickedFragment.y;
        zoomToPoint(vx, vy);
      } else {
        // 双击空白区域时放大该区域
        const vx = mx / scale + viewOffsetX;
        const vy = my / scale + viewOffsetY;
        zoomToPoint(vx, vy);
      }
    });

    canvas.addEventListener('click', e => {
      if (isDragging) return;
      
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      
      const clicked = fragments.find(f => f.isPointInside(mx, my, viewOffsetX, viewOffsetY, scale));
      
      if (clicked) {
        selectedFragment = clicked;
        clicked.showDetails();
        deleteBtn.classList.add('highlight');
      } else {
        selectedFragment = null;
        detailBox.style.display = 'none';
        deleteBtn.classList.remove('highlight');
      }
    });
    
    // UI显示/隐藏逻辑
    topTrigger.addEventListener('mouseenter', () => {
      showUI();
    });
    
    uiContainer.addEventListener('mouseleave', () => {
      if (!uiLocked) {
        hideUI();
      }
    });
    
    uiLock.addEventListener('click', toggleUILock);
    
    zoomInBtn.addEventListener('click', zoomIn);
    zoomOutBtn.addEventListener('click', zoomOut);
    resetViewBtn.addEventListener('click', resetView);
    
    // 分类筛选
    document.querySelectorAll('.category-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.category-btn').forEach(b => 
          b.classList.remove('active')
        );
        btn.classList.add('active');
        activeCategory = btn.dataset.category;
        
        // 如果在3D模式中，重新加载3D场景
        if (is3dMode) {
          enter3dMode();
        }
      });
    });
    
    // 3D模式切换
    view3dBtn.addEventListener('click', enter3dMode);
    backTo2dBtn.addEventListener('click', exit3dMode);
    
    // 小结面板关闭
    closeSummary.addEventListener('click', () => {
      summaryPanel.style.display = 'none';
    });
    
    // 螺旋布局按钮
    spiralBtn.addEventListener('click', arrangeInSpiral);

    // 初始化
    document.getElementById('datePicker').value = getTodayDate();

    // 添加示例输入
    document.getElementById('inputText').value = 
      "刷抖音两个半小时\n" +
      "写代码3小时45分钟\n" +
      "听讲座一小时二十分\n" +
      "做志愿活动1.5小时\n" +
      "玩游戏两个小时\n" +
      "答辩准备三小时";

    // 启动动画
    animate();
    loadFragments();
    
    // 响应窗口大小变化
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      if (camera && renderer) {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    });
  </script>
</body>
